<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haxnation - {title}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="images/favicon.ico" title="Favicon"/>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        canvas: '#fafafa', ink: '#0b0b0b', card: '#ffffff',
                        cyan: '#5ce1e6', danger: '#ff2a2a',
                        success: '#00e676', warning: '#ffeb3b'
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary {
                @apply font-mono uppercase tracking-widest font-bold bg-cyan text-ink border-2 border-ink px-6 py-3 shadow-[4px_4px_0_0_#0b0b0b] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0_0_#0b0b0b] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all duration-75 focus:outline-none focus:ring-2 focus:ring-cyan focus:ring-offset-2;
            }
        }
    </style>
</head>

<body class="bg-canvas text-ink font-sans min-h-screen antialiased selection:bg-cyan selection:text-ink smooth-scroll">
    <div class="fixed inset-0 pointer-events-none bg-[linear-gradient(to_right,#80808020_1px,transparent_1px),linear-gradient(to_bottom,#80808020_1px,transparent_1px)] bg-[size:32px_32px]"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 left-0 right-0 z-50 border-b-2 border-ink bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center bg-ink border-2 border-ink px-3 py-1 shadow-[2px_2px_0_0_#0b0b0b] hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-[1px_1px_0_0_#0b0b0b] transition-all duration-75 block">
                        <img src="images/logo_wt.png" onerror="this.src='images/logo.png'" alt="Haxnation Logo" class="h-6 w-auto block object-contain filter invert">
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8 font-mono text-sm font-bold uppercase">
                    <a href="/#offerings" class="text-ink hover:text-cyan border-b-4 border-transparent hover:border-cyan pb-1 transition-colors block">Offerings</a>
                    <a href="/#about" class="text-ink hover:text-cyan border-b-4 border-transparent hover:border-cyan pb-1 transition-colors block">About</a>
                    <a href="/#contact" class="btn-primary py-2 px-4 text-xs ml-4">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content Section -->
    <section class="py-20 relative z-10 border-b-2 border-ink min-h-[70vh]">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-12">
                <p class="font-mono text-xs font-bold uppercase tracking-widest text-white mb-4 bg-danger inline-block px-2 border-2 border-ink shadow-[2px_2px_0_0_#0b0b0b]">SYS // DOCUMENTATION</p>
                <h1 class="text-5xl md:text-7xl font-black text-ink uppercase tracking-tighter leading-none mb-8 border-b-4 border-ink pb-4">
                    {title}
                    <span class="inline-block w-4 h-[0.8em] bg-cyan animate-pulse align-middle ml-2 border-2 border-ink"></span>
                </h1>
            </div>
            
            <div class="prose max-w-none">
                {content}
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-ink text-white py-16 relative z-10 border-t-8 border-cyan">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-center md:text-left">
                    <p class="text-gray-400 font-mono text-xs">
                        SYS.DATE: 2026 // HAXNATION. ALL RIGHTS RESERVED.
                    </p>
                </div>
                <div class="flex flex-wrap justify-center md:justify-end gap-4 md:gap-6 font-mono text-xs">
                    <a href="/privacy-policy.html" class="text-gray-400 hover:text-cyan transition-colors">Privacy Policy</a>
                    <a href="/terms-and-conditions.html" class="text-gray-400 hover:text-cyan transition-colors">Terms & Conditions</a>
                    <a href="/refund-policy.html" class="text-gray-400 hover:text-cyan transition-colors">Refund Policy</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
